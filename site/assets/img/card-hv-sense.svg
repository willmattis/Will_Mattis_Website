<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="HV Sense Board PCB">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1410"/>
      <stop offset="1" stop-color="#0a0f0d"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1c22"/>
      <stop offset="1" stop-color="#101015"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#f0a92b" opacity="0.18"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- traces -->
  <g stroke="#f0a92b" stroke-width="2.5" fill="none" opacity="0.55" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 120 H180 L220 160 H360"/>
    <path d="M40 220 H140 L180 260 H300"/>
    <path d="M760 140 H620 L580 180 H470"/>
    <path d="M760 300 H640 L600 340 H470"/>
    <path d="M120 460 H300 L340 420 H470"/>
    <path d="M680 460 H520 L480 420"/>
  </g>
  <g fill="#f0a92b" opacity="0.8">
    <circle cx="40" cy="120" r="5"/><circle cx="40" cy="220" r="5"/>
    <circle cx="760" cy="140" r="5"/><circle cx="760" cy="300" r="5"/>
    <circle cx="120" cy="460" r="5"/><circle cx="680" cy="460" r="5"/>
  </g>

  <!-- central IC -->
  <g filter="url(#glow)">
    <rect x="300" y="180" width="200" height="140" rx="10" fill="url(#chip)" stroke="#f0a92b" stroke-width="2" stroke-opacity="0.7"/>
  </g>
  <g stroke="#f0a92b" stroke-width="3" opacity="0.85">
    <line x1="288" y1="205" x2="300" y2="205"/><line x1="288" y1="230" x2="300" y2="230"/>
    <line x1="288" y1="255" x2="300" y2="255"/><line x1="288" y1="280" x2="300" y2="280"/><line x1="288" y1="305" x2="300" y2="305"/>
    <line x1="500" y1="205" x2="512" y2="205"/><line x1="500" y1="230" x2="512" y2="230"/>
    <line x1="500" y1="255" x2="512" y2="255"/><line x1="500" y1="280" x2="512" y2="280"/><line x1="500" y1="305" x2="512" y2="305"/>
  </g>
  <circle cx="318" cy="198" r="5" fill="#f0a92b"/>
  <text x="400" y="258" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="20" fill="#e8eee9" letter-spacing="1">ISO / AIR</text>

  <text x="48" y="430" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="15" fill="#f0a92b" opacity="0.8" letter-spacing="3">BEV · HV / PRECHARGE</text>
  <text x="48" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" font-size="34" fill="#f4f7f5">HV Sense Board</text>
</svg>
